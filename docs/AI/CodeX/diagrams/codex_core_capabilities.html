<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codex 核心能力架构</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.4 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  main { max-width: 980px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .hl { font-size: 12px; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; rx: 6; ry: 6; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.8; }
</style>
<main>
  <svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg">
    <text x="450" y="40" class="title" text-anchor="middle">Codex 核心能力架构</text>

    <!-- Top: 工程化设计思想层 -->
    <rect class="zone" x="20" y="60" width="860" height="70" />
    <text x="450" y="80" class="label" text-anchor="middle" fill="var(--muted)">工程化设计思想层</text>
    
    <rect x="40" y="90" width="190" height="30" class="node input" />
    <text x="135" y="110" class="hl" text-anchor="middle">规范工程驱动</text>
    <rect x="250" y="90" width="190" height="30" class="node process" />
    <text x="345" y="110" class="hl" text-anchor="middle">Agent 循环机制</text>
    <rect x="460" y="90" width="190" height="30" class="node external" />
    <text x="555" y="110" class="hl" text-anchor="middle">上下文工程</text>
    <rect x="670" y="90" width="190" height="30" class="node storage" />
    <text x="765" y="110" class="hl" text-anchor="middle">外部工具集成</text>

    <!-- Middle: 核心能力层 -->
    <rect class="zone" x="20" y="150" width="860" height="250" />
    <text x="450" y="170" class="label" text-anchor="middle" fill="var(--muted)">核心能力层</text>

    <!-- 3 columns -->
    <rect x="40" y="185" width="260" height="44" class="node process" />
    <text x="170" y="206" class="hl" text-anchor="middle">🔄 多任务处理（多线程）</text>
    <rect x="40" y="240" width="260" height="44" class="node process" />
    <text x="170" y="261" class="hl" text-anchor="middle">🌳 Git WorkTree 并行开发</text>
    <rect x="40" y="295" width="260" height="44" class="node process" />
    <text x="170" y="316" class="hl" text-anchor="middle">📱 远程连接（手机→电脑）</text>

    <rect x="320" y="185" width="260" height="44" class="node input" />
    <text x="450" y="206" class="hl" text-anchor="middle">⌨️ 应用操作 &amp; 浏览器控制</text>
    <rect x="320" y="240" width="260" height="44" class="node input" />
    <text x="450" y="261" class="hl" text-anchor="middle">🖼️ 图片生成（DALL-E / GPT-Image2）</text>
    <rect x="320" y="295" width="260" height="44" class="node input" />
    <text x="450" y="316" class="hl" text-anchor="middle">🤖 全自动工具链任务</text>

    <rect x="600" y="185" width="260" height="44" class="node storage" />
    <text x="730" y="206" class="hl" text-anchor="middle">🧩 Skill 搭建（企业级）</text>
    <rect x="600" y="240" width="260" height="44" class="node storage" />
    <text x="730" y="261" class="hl" text-anchor="middle">🔌 插件系统（可扩展）</text>
    <rect x="600" y="295" width="260" height="44" class="node storage" />
    <text x="730" y="316" class="hl" text-anchor="middle">📋 代码 Review &amp; 审查</text>

    <!-- Bottom: 应用场景层 -->
    <rect class="zone" x="20" y="420" width="860" height="180" />
    <text x="450" y="440" class="label" text-anchor="middle" fill="var(--muted)">核心应用场景</text>

    <rect x="40" y="455" width="155" height="40" class="node external" />
    <text x="117" y="479" class="hl" text-anchor="middle">对话式编码</text>
    <rect x="210" y="455" width="155" height="40" class="node external" />
    <text x="287" y="479" class="hl" text-anchor="middle">开源项目分析</text>
    <rect x="380" y="455" width="155" height="40" class="node external" />
    <text x="457" y="479" class="hl" text-anchor="middle">代码审查 Review</text>
    <rect x="550" y="455" width="155" height="40" class="node external" />
    <text x="627" y="479" class="hl" text-anchor="middle">线上问题排查</text>
    <rect x="720" y="455" width="140" height="40" class="node external" />
    <text x="790" y="479" class="hl" text-anchor="middle">0→1 项目开发</text>

    <text x="450" y="545" class="small" text-anchor="middle">能力之间可组合使用 → 全局思维，把功能串起来成完整工作流</text>
    <text x="450" y="565" class="small" text-anchor="middle">不要孤立看待每个功能！整合才是 Codex 真正的力量</text>

    <!-- Connectors -->
    <path d="M 135 120 L 135 185" class="edge" />
    <path d="M 345 120 L 345 185" class="edge" />
    <path d="M 555 120 L 555 185" class="edge" />
    <path d="M 765 120 L 765 185" class="edge" />
    
    <path d="M 170 339 L 170 455" class="edge" />
    <path d="M 450 339 L 450 455" class="edge" />
    <path d="M 730 339 L 730 455" class="edge" />
  </svg>
</main>
