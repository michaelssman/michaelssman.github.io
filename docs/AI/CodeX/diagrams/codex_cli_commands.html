<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codex CLI 命令体系</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.4 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  main { max-width: 980px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 14px; font-weight: 600; fill: var(--fg); }
  .hl { font-size: 12px; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; rx: 6; ry: 6; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
</style>
<main>
  <svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
    <text x="450" y="40" class="title" text-anchor="middle">Codex CLI 命令体系总览</text>

    <!-- 6 categories in 2 rows of 3 -->

    <!-- Row 1 -->
    <rect x="20" y="70" width="280" height="220" class="node neutral" />
    <text x="160" y="95" class="label" text-anchor="middle">🛠️ 执行与对话</text>
    <rect x="35" y="110" width="250" height="30" class="node input" />
    <text x="160" y="130" class="hl" text-anchor="middle">⬅️ codex（进入交互模式）</text>
    <rect x="35" y="148" width="250" height="30" class="node process" />
    <text x="160" y="167" class="hl" text-anchor="middle">⚡ exec（非交互式执行）</text>
    <rect x="35" y="186" width="250" height="30" class="node external" />
    <text x="160" y="206" class="hl" text-anchor="middle">🆕 /new（开启新对话）</text>
    <rect x="35" y="224" width="250" height="30" class="node storage" />
    <text x="160" y="244" class="hl" text-anchor="middle">🔄 /resume（恢复对话）</text>

    <rect x="310" y="70" width="280" height="220" class="node neutral" />
    <text x="450" y="95" class="label" text-anchor="middle">🔐 权限与模型</text>
    <rect x="325" y="110" width="250" height="30" class="node input" />
    <text x="450" y="130" class="hl" text-anchor="middle">🔑 /permission（切换权限）</text>
    <rect x="325" y="148" width="250" height="30" class="node process" />
    <text x="450" y="167" class="hl" text-anchor="middle">🤖 /model（切换模型）</text>
    <rect x="325" y="186" width="250" height="30" class="node external" />
    <text x="450" y="206" class="hl" text-anchor="middle">👤 /personality（对话风格）</text>
    <rect x="325" y="224" width="250" height="30" class="node storage" />
    <text x="450" y="244" class="hl" text-anchor="middle">🎯 /vim（Vim编辑模式）</text>

    <rect x="600" y="70" width="280" height="220" class="node neutral" />
    <text x="740" y="95" class="label" text-anchor="middle">📋 审查与诊断</text>
    <rect x="615" y="110" width="250" height="30" class="node input" />
    <text x="740" y="130" class="hl" text-anchor="middle">🔎 /review（代码审查）</text>
    <rect x="615" y="148" width="250" height="30" class="node process" />
    <text x="740" y="167" class="hl" text-anchor="middle">📊 /stats（Token用量）</text>
    <rect x="615" y="186" width="250" height="30" class="node external" />
    <text x="740" y="206" class="hl" text-anchor="middle">📏 /ps（后台进程）</text>
    <rect x="615" y="224" width="250" height="30" class="node storage" />
    <text x="740" y="244" class="hl" text-anchor="middle">🛑 /stop（中断任务）</text>

    <!-- Row 2 -->
    <rect x="20" y="310" width="280" height="220" class="node neutral" />
    <text x="160" y="335" class="label" text-anchor="middle">🧩 开发辅助</text>
    <rect x="35" y="350" width="250" height="30" class="node input" />
    <text x="160" y="370" class="hl" text-anchor="middle">📝 /plan（规划模式）</text>
    <rect x="35" y="388" width="250" height="30" class="node process" />
    <text x="160" y="407" class="hl" text-anchor="middle">🎯 /goal（目标模式）</text>
    <rect x="35" y="426" width="250" height="30" class="node external" />
    <text x="160" y="446" class="hl" text-anchor="middle">📋 /copy（复制上次回复）</text>
    <rect x="35" y="464" width="250" height="30" class="node storage" />
    <text x="160" y="484" class="hl" text-anchor="middle">🔇 /loud | /silent（输出模式）</text>

    <rect x="310" y="310" width="280" height="220" class="node neutral" />
    <text x="450" y="335" class="label" text-anchor="middle">📁 项目与配置</text>
    <rect x="325" y="350" width="250" height="30" class="node input" />
    <text x="450" y="370" class="hl" text-anchor="middle">🚀 /init（生成 agents.md）</text>
    <rect x="325" y="388" width="250" height="30" class="node process" />
    <text x="450" y="407" class="hl" text-anchor="middle">📦 /packages（插件管理）</text>
    <rect x="325" y="426" width="250" height="30" class="node external" />
    <text x="450" y="446" class="hl" text-anchor="middle">⚙️ /status（状态栏配置）</text>
    <rect x="325" y="464" width="250" height="30" class="node storage" />
    <text x="450" y="484" class="hl" text-anchor="middle">🎨 /theme（主题切换）</text>

    <rect x="600" y="310" width="280" height="220" class="node neutral" />
    <text x="740" y="335" class="label" text-anchor="middle">🔗 高级特性</text>
    <rect x="615" y="350" width="250" height="30" class="node input" />
    <text x="740" y="370" class="hl" text-anchor="middle">🔌 /mcp（MCP服务管理）</text>
    <rect x="615" y="388" width="250" height="30" class="node process" />
    <text x="740" y="407" class="hl" text-anchor="middle">🧠 /skill（技能管理）</text>
    <rect x="615" y="426" width="250" height="30" class="node external" />
    <text x="740" y="446" class="hl" text-anchor="middle">📎 /fork | /side（分支对话）</text>
    <rect x="615" y="464" width="250" height="30" class="node storage" />
    <text x="740" y="484" class="hl" text-anchor="middle">🗜️ /compact（压缩上下文）</text>

    <!-- Legend -->
    <rect x="100" y="555" width="12" height="12" class="input" stroke="var(--line)" />
    <text x="118" y="565" class="small">高频常用</text>
    <rect x="260" y="555" width="12" height="12" class="process" stroke="var(--line)" />
    <text x="278" y="565" class="small">执行类</text>
    <rect x="420" y="555" width="12" height="12" class="external" stroke="var(--line)" />
    <text x="438" y="565" class="small">辅助工具</text>
    <rect x="580" y="555" width="12" height="12" class="storage" stroke="var(--line)" />
    <text x="598" y="565" class="small">配置管理</text>
  </svg>
</main>
