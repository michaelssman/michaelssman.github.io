<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Codex 课程知识体系</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
    }
  }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.4 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  main { max-width: 980px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 14px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 12px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1; rx: 6; ry: 6; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .edge { stroke: var(--line); stroke-width: 1.5; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.8; }
</style>
<main>
  <svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
    <text x="450" y="40" class="title" text-anchor="middle">Codex 课程知识体系 — 11 大模块</text>

    <!-- Center Hub -->
    <rect x="350" y="80" width="200" height="50" class="node process" />
    <text x="450" y="110" class="label" text-anchor="middle">Codex 实战教程</text>

    <!-- Layer 1 left side - Foundations -->
    <rect x="50" y="170" width="220" height="44" class="node input" />
    <text x="160" y="197" class="label" text-anchor="middle">① 核心能力与工程化思想</text>

    <rect x="50" y="230" width="220" height="44" class="node input" />
    <text x="160" y="257" class="label" text-anchor="middle">② 安装与开发环境搭建</text>

    <rect x="50" y="290" width="220" height="44" class="node input" />
    <text x="160" y="317" class="label" text-anchor="middle">③ CLI 高效交互指南</text>

    <rect x="50" y="350" width="220" height="44" class="node input" />
    <text x="160" y="377" class="label" text-anchor="middle">④ 内置斜杠指令体系</text>

    <rect x="50" y="410" width="220" height="44" class="node input" />
    <text x="160" y="437" class="label" text-anchor="middle">⑤ agents.md 配置与架构</text>

    <!-- Layer 1 right side - Advanced -->
    <rect x="630" y="170" width="220" height="44" class="node external" />
    <text x="740" y="197" class="label" text-anchor="middle">⑥ MCP 核心协议</text>

    <rect x="630" y="230" width="220" height="44" class="node external" />
    <text x="740" y="257" class="label" text-anchor="middle">⑦ 从需求到落地的 Scaling</text>

    <rect x="630" y="290" width="220" height="44" class="node external" />
    <text x="740" y="317" class="label" text-anchor="middle">⑧ Sabre Agents 多智能体</text>

    <rect x="630" y="350" width="220" height="44" class="node external" />
    <text x="740" y="377" class="label" text-anchor="middle">⑨ 高阶插件整合</text>

    <rect x="630" y="410" width="220" height="44" class="node external" />
    <text x="740" y="437" class="label" text-anchor="middle">⑩ 企业级专属插件</text>

    <!-- Bottom -->
    <rect x="300" y="490" width="300" height="44" class="node storage" />
    <text x="450" y="517" class="label" text-anchor="middle">⑪ 全流程 RAG 系统开发实战</text>

    <!-- Connectors: center to left -->
    <path d="M 370 130 L 160 170" class="edge" />
    <path d="M 370 130 L 160 230" class="edge" />
    <path d="M 370 130 L 160 290" class="edge" />
    <path d="M 370 130 L 160 350" class="edge" />
    <path d="M 370 130 L 160 410" class="edge" />

    <!-- Connectors: center to right -->
    <path d="M 530 130 L 740 170" class="edge" />
    <path d="M 530 130 L 740 230" class="edge" />
    <path d="M 530 130 L 740 290" class="edge" />
    <path d="M 530 130 L 740 350" class="edge" />
    <path d="M 530 130 L 740 410" class="edge" />

    <!-- Connectors: left/right to bottom -->
    <path d="M 160 454 L 160 490 L 300 490" class="edge" />
    <path d="M 740 454 L 740 490 L 600 490" class="edge" />

    <!-- Legend -->
    <rect x="50" y="570" width="12" height="12" class="input" stroke="var(--line)" stroke-width="1" />
    <text x="70" y="581" class="small">基础篇（本视频）</text>
    <rect x="200" y="570" width="12" height="12" class="external" stroke="var(--line)" stroke-width="1" />
    <text x="220" y="581" class="small">进阶篇</text>
    <rect x="350" y="570" width="12" height="12" class="process" stroke="var(--line)" stroke-width="1" />
    <text x="370" y="581" class="small">核心枢纽</text>
    <rect x="500" y="570" width="12" height="12" class="storage" stroke="var(--line)" stroke-width="1" />
    <text x="520" y="581" class="small">实战终章</text>
  </svg>
</main>
